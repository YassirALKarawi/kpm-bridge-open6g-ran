name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[test]'

      - name: Run deterministic unit tests
        run: make test

      - name: Run non-claim smoke experiment
        run: make smoke

  generated-assets:
    name: Generated evidence assets
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Regenerate tables and result figures
        run: make assets

      - name: Confirm expected independent figures
        run: |
          test "$(find manuscript/figures -maxdepth 1 -name 'fig_*.pdf' | wc -l)" -eq 13
          test "$(find manuscript/figures -maxdepth 1 -name 'fig*.jpeg' | wc -l)" -eq 3
