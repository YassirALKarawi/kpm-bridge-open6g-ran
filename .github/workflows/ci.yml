name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[test]'

      - name: Run deterministic unit tests
        run: make test

      - name: Run non-claim smoke experiment
        run: make smoke

  generated-assets:
    name: Generated evidence assets
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Regenerate tables and result figures
        run: make assets

      - name: Confirm expected independent figures
        run: |
          test "$(find manuscript/figures -maxdepth 1 -name 'fig_*.pdf' | wc -l)" -eq 13
          test "$(find manuscript/figures -maxdepth 1 -name 'fig*.jpeg' | wc -l)" -eq 3

      - name: Confirm generated assets are current
        run: git diff --exit-code -- manuscript/generated manuscript/figures

  manuscript-integrity:
    name: Manuscript and evidence integrity
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Install LaTeX and PDF audit tools
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            latexmk poppler-utils texlive-fonts-recommended texlive-latex-extra

      - name: Fetch and verify the pinned benchmark subset
        run: |
          make fetch
          git diff --exit-code -- data/colosseum_subset_manifest.json

      - name: Verify DOI metadata
        run: make references

      - name: Build the IEEE manuscript
        run: make paper

      - name: Run fail-closed manuscript audit
        run: make claims

      - name: Confirm tracked audits and bibliography are current
        run: |
          git diff --exit-code -- manuscript/main.bbl
          git diff --exit-code -- reproducibility/outputs/claim_audit.csv
          git diff --exit-code -- reproducibility/outputs/reference_audit.csv
