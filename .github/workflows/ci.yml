name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[test]'

      - name: Run deterministic unit tests
        run: make test

      - name: Run non-claim smoke experiment
        run: make smoke

  generated-assets:
    name: Generated evidence assets
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Regenerate tables and result figures
        run: make assets

      - name: Validate regenerated publication figures
        run: |
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          root = Path("manuscript/figures")
          pdfs = sorted(root.glob("fig_*.pdf"))
          pngs = sorted(root.glob("fig_*.png"))
          illustrations = sorted(root.glob("fig*.jpeg"))

          assert len(pdfs) == 13, f"expected 13 result PDFs, found {len(pdfs)}"
          assert len(pngs) == 13, f"expected 13 result PNGs, found {len(pngs)}"
          assert len(illustrations) == 3, (
              f"expected 3 architecture illustrations, found {len(illustrations)}"
          )
          assert [p.stem for p in pdfs] == [p.stem for p in pngs], (
              "PDF/PNG result-figure sets do not match"
          )

          for path in pdfs:
              assert path.stat().st_size >= 1_000, f"{path} is unexpectedly small"
              assert path.read_bytes().startswith(b"%PDF-"), f"{path} is not a PDF"

          for path in pngs:
              assert path.stat().st_size >= 10_000, f"{path} is unexpectedly small"
              with Image.open(path) as image:
                  image.verify()
              with Image.open(path) as image:
                  width, height = image.size
              assert width >= 900 and height >= 500, (
                  f"{path} resolution is only {width}x{height}"
              )
          PY

      - name: Confirm generated numerical evidence is current
        run: git diff --exit-code -- manuscript/generated

  manuscript-integrity:
    name: Manuscript and evidence integrity
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e .

      - name: Install LaTeX and PDF audit tools
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            latexmk poppler-utils texlive-fonts-recommended texlive-latex-extra

      - name: Fetch and verify the pinned benchmark subset
        run: |
          make fetch
          git diff --exit-code -- data/colosseum_subset_manifest.json

      - name: Verify DOI metadata
        run: make references

      - name: Build the IEEE manuscript
        run: make paper

      - name: Run fail-closed manuscript audit
        run: make claims

      - name: Confirm tracked audits and bibliography are current
        run: |
          git diff --exit-code -- manuscript/main.bbl
          git diff --exit-code -- reproducibility/outputs/claim_audit.csv
          git diff --exit-code -- reproducibility/outputs/reference_audit.csv
